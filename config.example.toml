# PSST — Push, Speak, Send Text
# Example configuration file.
#
# Copy this to config.toml in the same directory (or %APPDATA%/psst/config.toml)
# and edit as needed. All values shown are the defaults.
#
# Config search order:
#   1. --config CLI flag
#   2. ./config.toml  (same directory as where you run psst)
#   3. %APPDATA%/psst/config.toml
#   4. ~/.psst/config.toml
#   5. Built-in defaults (no file needed)

# ---------------------------------------------------------------------------
# Hotkeys
# ---------------------------------------------------------------------------
# Hold this key combo to record. Release to transcribe.
# Examples: "ctrl+shift+space", "right ctrl", "f13"
hotkey = "ctrl+shift+space"

# Press this key while recording to cancel and discard the audio.
cancel_hotkey = "escape"

# ---------------------------------------------------------------------------
# Audio recording
# ---------------------------------------------------------------------------
sample_rate = 16000        # Hz — Whisper expects 16 kHz
channels = 1               # Mono
min_recording_seconds = 0.3
max_recording_seconds = 300.0   # 300 = 5 minutes — adjust to taste

# ---------------------------------------------------------------------------
# Whisper transcription
# ---------------------------------------------------------------------------
# Model sizes (smaller = faster, larger = more accurate):
#   tiny, base, small, medium, large-v2, large-v3
model = "small"

# Device: "auto" detects CUDA; use "cpu" to force CPU
device = "auto"

# Compute type: "auto" picks float16 (CUDA) or int8 (CPU)
# Options: "auto", "float16", "int8", "float32"
compute_type = "auto"

# Language code (e.g. "en", "fr", "de") or leave unset for auto-detection
# language = "en"

# Voice activity detection filter — skip silence-only segments
vad_filter = true

# ---------------------------------------------------------------------------
# LLM cleanup  (on by default — model is auto-downloaded on first use)
# ---------------------------------------------------------------------------
# When enabled, Whisper output is passed through a local LLM to fix
# punctuation, capitalisation, and remove remaining filler words.
# Note: Whisper itself already suppresses many filler words via its VAD
# filter; LLM cleanup adds capitalisation, punctuation, and catches the rest.
# If the configured backend cannot be initialised, PSST silently falls back
# to Whisper output — your dictation is never lost.
cleanup_enabled = true

# Backend: "llama_cpp" (recommended — plug-and-play with a GGUF file)
#          "ollama"    (requires Ollama running locally)
cleanup_backend = "llama_cpp"

# Model name (used by Ollama backend); for llama_cpp use llama_cpp_model_path
# Ollama pull: ollama pull qwen3.5:4b
cleanup_model = "qwen3.5:4b"

# Timeout in seconds before falling back to Whisper text
cleanup_timeout = 60

# Chat template format used by the LLM (chatml works for Qwen models)
chat_format = "chatml"

# ---------------------------------------------------------------------------
# llama_cpp backend (recommended)
# ---------------------------------------------------------------------------
# By default, PSST auto-downloads a GGUF model from Hugging Face on first use.
# Change these to use a different model from HF:
llama_cpp_repo_id = "unsloth/Qwen3.5-4B-GGUF"
llama_cpp_filename = "Qwen3.5-4B-Q4_K_M.gguf"

# To use a local GGUF file instead of auto-download, set the path below.
# This overrides repo_id/filename when set.
# llama_cpp_model_path = "C:/models/your-model.gguf"

# ---------------------------------------------------------------------------
# Ollama backend
# ---------------------------------------------------------------------------
# Ollama server URL (only used when cleanup_backend = "ollama")
ollama_url = "http://localhost:11434"

# ---------------------------------------------------------------------------
# Prompt profiles
# ---------------------------------------------------------------------------
# Select which prompt profile the LLM cleanup uses.
# Use --prompt <name> on the CLI to override at runtime.
active_prompt = "default"

# Define or override prompt profiles. Three built-in profiles are always
# available (default, code, actions). Add your own below.

[prompts.default]
name = "Default Dictation"
instruction = "Clean up this dictated text. Fix grammar, punctuation, and remove filler words. Do not change the meaning. Return only the cleaned text."

[prompts.code]
name = "Code Docstrings"
instruction = "This is dictated documentation for code. Format it as a proper docstring. Fix grammar and make it technical and concise."

[prompts.actions]
name = "Action Items"
instruction = "Extract action items from this dictated text. Format as a numbered list of clear, actionable tasks."

# Example custom profile:
# [prompts.email]
# name = "Email Draft"
# instruction = "Format this dictated text as a professional email. Fix grammar and punctuation. Keep it concise."

# ---------------------------------------------------------------------------
# Audio cues
# ---------------------------------------------------------------------------
# Play audio cues (start/stop/done/cancel tones). Windows only.
audio_cues = true

# Custom stop sound: place a file named "pssst.wav" in your working directory
# to use it instead of the generated tone when recording stops.

# ---------------------------------------------------------------------------
# UI / output
# ---------------------------------------------------------------------------
# Number of past transcriptions to keep in session history
history_size = 10

# Write transcriptions to a log file
log_to_file = false
log_file = "psst.log"

# Fall back to ctypes clipboard API if pyperclip fails
clipboard_fallback = true
